<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer hexagonal frame -->
  <polygon points="50,2 93,27 93,73 50,98 7,73 7,27" stroke="#d4af37" stroke-width="3" fill="none"/>
  <!-- Inner hex -->
  <polygon points="50,12 83,32 83,68 50,88 17,68 17,32" stroke="#d4af37" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Circuit traces -->
  <line x1="7" y1="27" x2="25" y2="36" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>
  <line x1="7" y1="73" x2="25" y2="64" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>
  <line x1="93" y1="27" x2="75" y2="36" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>
  <line x1="93" y1="73" x2="75" y2="64" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>
  <!-- Circuit nodes -->
  <circle cx="25" cy="36" r="2.5" fill="#d4af37" opacity="0.6"/>
  <circle cx="25" cy="64" r="2.5" fill="#d4af37" opacity="0.6"/>
  <circle cx="75" cy="36" r="2.5" fill="#d4af37" opacity="0.6"/>
  <circle cx="75" cy="64" r="2.5" fill="#d4af37" opacity="0.6"/>
  <circle cx="50" cy="12" r="2" fill="#d4af37" opacity="0.4"/>
  <circle cx="50" cy="88" r="2" fill="#d4af37" opacity="0.4"/>
  <!-- D letterform - angular/digital style -->
  <path d="M34,30 L34,70 L50,70 L65,60 L65,40 L50,30 Z" stroke="#d4af37" stroke-width="3.5" fill="none" stroke-linejoin="miter"/>
  <!-- Data flow lines inside D -->
  <line x1="40" y1="42" x2="56" y2="42" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="50" x2="60" y2="50" stroke="#d4af37" stroke-width="2" opacity="0.7"/>
  <line x1="40" y1="58" x2="56" y2="58" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <!-- Pulse dot -->
  <circle cx="60" cy="50" r="3" fill="#d4af37" opacity="0.9"/>
</svg>
