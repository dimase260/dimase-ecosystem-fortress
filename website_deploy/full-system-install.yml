                          <p>Our team of experts combines industry knowledge with creative thinking to solve complex challenges.</p>
                      </div>
                  </div>
              </section>
              <section id="services" class="services">
                  <div class="container">
                      <h2>Our Services</h2>
                      <div class="services-grid">
                          <div class="service-card">
                              <div class="service-icon">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                              </div>
                              <h3>Business Strategy</h3>
                              <p>Strategic planning and consulting to help your business reach new heights.</p>
                          </div>
                          <div class="service-card">
                              <div class="service-icon">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                              </div>
                              <h3>Digital Solutions</h3>
                              <p>Modern technology solutions to streamline operations and boost efficiency.</p>
                          </div>
                          <div class="service-card">
                              <div class="service-icon">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                              </div>
                              <h3>Consulting</h3>
                              <p>Expert guidance to navigate challenges and capitalize on opportunities.</p>
                          </div>
                      </div>
                  </div>
              </section>
              <section id="contact" class="contact">
                  <div class="container">
                      <h2>Contact Us</h2>
                      <div class="contact-content">
                          <div class="contact-info">
                              <p>Ready to take your business to the next level? Get in touch with us today.</p>
                              <div class="contact-details">
                                  <div class="contact-item">
                                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                      <a href="mailto:dimaseinc@gmail.com">dimaseinc@gmail.com</a>
