              <nav class="nav container">
                  <a href="#" class="logo">DiMase Inc.</a>
                  <ul class="nav-links">
                      <li><a href="#about">About</a></li>
                      <li><a href="#services">Services</a></li>
                      <li><a href="#contact">Contact</a></li>
                  </ul>
                  <button class="mobile-menu-btn" aria-label="Toggle menu">
                      <span></span>
                      <span></span>
                      <span></span>
                  </button>
              </nav>
          </header>
          <main>
