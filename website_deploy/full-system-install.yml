# ============================================================
# DIMASE INC WEBSITE - FULL SYSTEM INSTALLATION
# ============================================================
# Complete infrastructure-as-code for dimaseinc.org
# Run with: ansible-playbook full-system-install.yml
# Or use as reference for manual setup
# ============================================================

---
metadata:
  project: dimaseinc-website
  version: "1.0.0"
  author: DiMase Inc
  created: "2025-02-02"
  description: "Complete system build for dimaseinc.org business website"

# ============================================================
# SYSTEM REQUIREMENTS
# ============================================================
system_requirements:
  operating_systems:
    - ubuntu-22.04
    - ubuntu-24.04
    - debian-12
    - macos-14
    - windows-11

  minimum_specs:
    ram: "512MB"
    disk: "1GB"
    cpu: "1 core"

  software:
    nodejs:
      version: ">=20.0.0"
      required: true
    npm:
      version: ">=10.0.0"
      required: true
    git:
      version: ">=2.0.0"
      required: true
    wrangler:
      version: ">=4.0.0"
      required: true

# ============================================================
# INSTALLATION TASKS
# ============================================================
tasks:

  # ----------------------------------------------------------
  # TASK 1: System Dependencies
  # ----------------------------------------------------------
  - name: Install system dependencies
    platforms:
      ubuntu:
        commands:
          - sudo apt-get update
          - sudo apt-get install -y curl git build-essential
      debian:
        commands:
          - sudo apt-get update
          - sudo apt-get install -y curl git build-essential
      macos:
        commands:
          - xcode-select --install || true
          - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          - brew install git
      windows:
        commands:
          - winget install Git.Git

  # ----------------------------------------------------------
  # TASK 2: Install Node.js
  # ----------------------------------------------------------
  - name: Install Node.js
    platforms:
      ubuntu:
        commands:
          - curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          - sudo apt-get install -y nodejs
      debian:
        commands:
          - curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          - sudo apt-get install -y nodejs
      macos:
        commands:
          - brew install node@20
      windows:
        commands:
          - winget install OpenJS.NodeJS.LTS
    verify:
      command: node --version
      expected: "v20"

  # ----------------------------------------------------------
  # TASK 3: Install Wrangler CLI
  # ----------------------------------------------------------
  - name: Install Wrangler CLI
    all_platforms:
      commands:
        - npm install -g wrangler@latest
    verify:
      command: wrangler --version
      expected: "4."

  # ----------------------------------------------------------
  # TASK 4: Create Project Directory
  # ----------------------------------------------------------
  - name: Create project structure
    all_platforms:
      commands:
        - mkdir -p ~/dimaseinc-website/{css,js,images,.github/workflows}
        - cd ~/dimaseinc-website

  # ----------------------------------------------------------
  # TASK 5: Create Website Files
  # ----------------------------------------------------------
  - name: Create index.html
    file: index.html
    content: |
      <!DOCTYPE html>
